<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Rotina Pessoal</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1 class="titulo">Planeje com leveza</h1>
    </header>

    <div class="dashboard">
        <div class="topo">
        <img src="img/smiling-face.png" alt="" style="width: 35px; height: 35px;">
        <h2 class="subtitulo">Meu dia</h2>
        </div>
        <div class="card">
            <p style="font-family: 'Great Vibes', sans-serif; font-size: 20px;">Believe in yourself</p>
            <img src="img/heart.png" alt="" style="width: 10px; height: 10;">
            <p style="font-family: 'Lora', sans-serif; font-size: 16px;"> Adicione e organize suas prioridades <br> de forma
                simples. </p>
        </div>


        <div class="inserir">
        <input class="campo-texto" type="text" placeholder="Digite uma tarefa">
        <button class="adicionar">Adicionar</button>
        </div>

        <ul class="lista-tarefas"></ul>
    </div>

    <div class="mensagemDoDia">
    <p class="mensagem"></p>
    </div>

</body>

<script src="./script.js"></script>

</html>
